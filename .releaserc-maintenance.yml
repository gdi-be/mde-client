branches:
  - main
  - name: v6.1.x
    range: '6.1.x'
    channel: false

plugins:
  - - '@semantic-release/commit-analyzer'
    - releaseRules:
        - breaking: true
          release: major
        - type: feat
          release: patch
        - type: fix
          release: patch
        - type: perf
          release: patch
        - revert: true
          release: patch
  - '@semantic-release/release-notes-generator'
  - '@semantic-release/changelog'
  - '@semantic-release/github'
  - '@semantic-release/git'
